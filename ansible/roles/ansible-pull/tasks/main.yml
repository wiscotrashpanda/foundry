---
- name: Require an apt-based Linux host
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "The ansible-pull bootstrap role currently supports Debian/Ubuntu hosts."

- name: Ensure apt prerequisites exist
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: "{{ ansible_pull_apt_lock_timeout }}"

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install the official Ansible PPA signing key
  ansible.builtin.get_url:
    url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x{{ ansible_pull_ppa_fingerprint }}"
    dest: "{{ ansible_pull_ppa_keyring_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Enable the official Ansible PPA apt source
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ ansible_pull_ppa_keyring_path }}] https://ppa.launchpadcontent.net/ansible/ansible/ubuntu {{ ansible_facts['distribution_release'] }} main"
    filename: "{{ ansible_pull_ppa_source_file }}"
    state: present
    update_cache: false
  register: ansible_pull_ppa

- name: Refresh apt cache after enabling the Ansible PPA
  ansible.builtin.apt:
    update_cache: true
    lock_timeout: "{{ ansible_pull_apt_lock_timeout }}"
  when: ansible_pull_ppa.changed

- name: Install Ansible and ansible-pull dependencies
  ansible.builtin.apt:
    name:
      - ansible
      - git
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: "{{ ansible_pull_apt_lock_timeout }}"

- name: Ensure Ansible configuration directory exists
  ansible.builtin.file:
    path: /etc/ansible
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create the vault password file if it is missing
  ansible.builtin.copy:
    dest: "{{ ansible_pull_vault_password_file }}"
    content: ""
    owner: root
    group: root
    mode: "0600"
    force: false

- name: Enforce vault password file ownership and permissions
  ansible.builtin.file:
    path: "{{ ansible_pull_vault_password_file }}"
    owner: root
    group: root
    mode: "0600"
    state: file

- name: Configure system Ansible defaults
  ansible.builtin.template:
    src: ansible.cfg.j2
    dest: "{{ ansible_pull_config_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Ensure ansible-pull checkout directory exists
  ansible.builtin.file:
    path: "{{ ansible_pull_checkout_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install the foundry-pull wrapper
  ansible.builtin.template:
    src: foundry-pull.sh.j2
    dest: "{{ ansible_pull_wrapper_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install the ansible-pull service unit
  ansible.builtin.template:
    src: ansible-pull.service.j2
    dest: "/etc/systemd/system/{{ ansible_pull_service_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install the ansible-pull timer unit
  ansible.builtin.template:
    src: ansible-pull.timer.j2
    dest: "/etc/systemd/system/{{ ansible_pull_timer_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush systemd reload before enabling the timer
  ansible.builtin.meta: flush_handlers

- name: Enable and start the ansible-pull timer
  ansible.builtin.systemd:
    name: "{{ ansible_pull_timer_name }}"
    enabled: true
    state: started
