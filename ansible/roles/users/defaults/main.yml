---
# Sudo group with passwordless escalation. Created on the host as a manual
# prerequisite (see ansible/README.md) - the role only adds members to it.
users_passwordless_sudo_group: admin-sudo

# Public key file on the Ansible controller that gets installed into each
# user's authorized_keys.
users_public_key_file: "{{ lookup('env', 'HOME') }}/.ssh/foundry.pub"

# Oh My Zsh source - cloned per-user into ~/.oh-my-zsh.
users_oh_my_zsh_repo: https://github.com/ohmyzsh/ohmyzsh.git
users_oh_my_zsh_version: master

# .zshrc template variables (consumed by templates/zshrc.j2). Override these
# in group_vars or host_vars to customize the rendered file.
users_zsh_theme: robbyrussell
users_zsh_plugins:
  - git
users_zsh_aliases:
  ls: eza
# Extra raw lines appended to .zshrc (after aliases, before the local sourcing
# hook). Useful for one-off env exports without forking the template.
users_zsh_extra_lines: []

# CLI configuration homes are created per-user so auth state is never shared
# between managed accounts. Auth tokens are intentionally left for each user
# to add interactively with the CLI (`gh auth login`, `gcloud auth login`,
# `aws configure`, `tea login add`, etc.).
#
# `users_cli_config_dirs` are subdirectories under each user's `~/.config/`
# (XDG-style tools).
users_cli_config_dirs:
  - gh
  - tea
  - gcloud
  - opencode

# `users_cli_home_dirs` are CLI homes that live directly under `~/` because
# the tool does not honor XDG. Each entry is `{ path, mode }` where `path` is
# relative to the user's home directory.
users_cli_home_dirs:
  - path: .aws
    mode: "0700"
  - path: .claude
    mode: "0700"
  - path: .codex
    mode: "0700"
  - path: .terraform.d
    mode: "0700"

users_gh_initial_config:
  git_protocol: ssh
  prompt: enabled

# Per-user overrides: a map of username -> dict that gets merged on top of the
# role-level defaults when rendering each user's .zshrc / .gitconfig. Example:
#   users_overrides:
#     josh:
#       zsh_plugins: [git, docker, kubectl]
#       zsh_aliases:
#         k: kubectl
users_overrides: {}
