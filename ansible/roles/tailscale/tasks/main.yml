---
- name: Check whether Tailscale is already installed
  ansible.builtin.stat:
    path: "{{ foundry_tailscale_binary_path }}"
  register: foundry_tailscale_binary

- name: Read existing Tailscale status
  ansible.builtin.command:
    argv:
      - "{{ foundry_tailscale_binary_path }}"
      - status
      - --json
  register: foundry_tailscale_status
  changed_when: false
  failed_when: false
  when:
    - foundry_tailscale_binary.stat.exists
    - foundry_tailscale_state != 'absent'

- name: Parse existing Tailscale status
  ansible.builtin.set_fact:
    foundry_tailscale_status_json: "{{ foundry_tailscale_status.stdout | from_json }}"
  when:
    - foundry_tailscale_status is not skipped
    - foundry_tailscale_status.rc == 0
    - foundry_tailscale_status.stdout | trim | length > 0

- name: Determine whether Tailscale is already enrolled
  ansible.builtin.set_fact:
    foundry_tailscale_already_enrolled: >-
      {{
        foundry_tailscale_status_json is defined
        and ((foundry_tailscale_status_json.get('Self') or {}).get('ID', '') | length > 0)
        and foundry_tailscale_status_json.get('BackendState', '') not in ['NeedsLogin', 'NoState']
      }}

- name: Check for the optional Tailscale vault file
  ansible.builtin.stat:
    path: "{{ foundry_tailscale_vault_file }}"
  register: foundry_tailscale_vault
  delegate_to: localhost
  become: false

- name: Load Tailscale vault variables
  ansible.builtin.include_vars:
    file: "{{ foundry_tailscale_vault_file }}"
  register: foundry_tailscale_vault_load
  failed_when: false
  no_log: true
  when:
    - foundry_tailscale_vault.stat.exists
    - not (foundry_tailscale_already_enrolled | bool)
    - lookup('env', 'TAILSCALE_AUTHKEY') | trim | length == 0

- name: Require an auth key
  ansible.builtin.assert:
    that:
      - foundry_tailscale_authkey | trim | length > 0
    fail_msg: >-
      Set TAILSCALE_AUTHKEY or provide vault_tailscale_authkey in
      {{ foundry_tailscale_vault_file }}.
  when:
    - foundry_tailscale_state != 'absent'
    - not (foundry_tailscale_already_enrolled | bool)

- name: Normalize Tailscale route and argument inputs
  ansible.builtin.set_fact:
    foundry_tailscale_advertise_routes_normalized: >-
      {{
        ([foundry_tailscale_advertise_routes]
          if foundry_tailscale_advertise_routes is string
          else foundry_tailscale_advertise_routes)
        | map('trim')
        | reject('equalto', '')
        | list
      }}
    foundry_tailscale_extra_args_normalized: >-
      {{
        ([foundry_tailscale_extra_args]
          if foundry_tailscale_extra_args is string
          else foundry_tailscale_extra_args)
        | map('trim')
        | reject('equalto', '')
        | list
      }}

- name: Validate Tailscale route and argument inputs
  ansible.builtin.assert:
    that:
      - foundry_tailscale_advertise_routes_normalized | type_debug == 'list'
      - foundry_tailscale_extra_args_normalized | type_debug == 'list'
      - >-
        not (
          '--advertise-routes' in foundry_tailscale_args
          and foundry_tailscale_advertise_routes_normalized | length > 0
        )
    fail_msg: >-
      Set subnet routes in foundry_tailscale_advertise_routes, or put
      --advertise-routes in foundry_tailscale_args, but do not use both.

- name: Build Tailscale up arguments
  ansible.builtin.set_fact:
    foundry_tailscale_effective_args: >-
      {{
        (
          [foundry_tailscale_args | trim]
          + (
            [
              '--advertise-routes='
              ~ (foundry_tailscale_advertise_routes_normalized | join(','))
            ]
            if foundry_tailscale_advertise_routes_normalized | length > 0
            else []
          )
          + foundry_tailscale_extra_args_normalized
        )
        | reject('equalto', '')
        | join(' ')
      }}

- name: Enable kernel forwarding for Tailscale subnet routing
  ansible.builtin.copy:
    dest: "{{ foundry_tailscale_subnet_routing_sysctl_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1
  register: foundry_tailscale_subnet_routing_sysctl
  when:
    - foundry_tailscale_manage_subnet_routing_sysctl | bool
    - "'--advertise-routes' in foundry_tailscale_effective_args"

- name: Apply kernel forwarding for Tailscale subnet routing
  ansible.builtin.command:
    argv:
      - sysctl
      - --system
  changed_when: true
  when:
    - foundry_tailscale_subnet_routing_sysctl.changed
    - not ansible_check_mode

- name: Install Tailscale apt keyring
  ansible.builtin.get_url:
    url: "{{ foundry_tailscale_apt_keyring_url }}"
    dest: "{{ foundry_tailscale_apt_keyring_path }}"
    timeout: 30
    owner: root
    group: root
    mode: "0644"
  when: foundry_tailscale_state == 'present'

- name: Add Tailscale apt repository
  ansible.builtin.deb822_repository:
    name: tailscale
    types:
      - deb
    uris:
      - "{{ foundry_tailscale_apt_repo }}"
    suites:
      - "{{ foundry_tailscale_apt_suite }}"
    components:
      - main
    architectures:
      - "{{ foundry_tailscale_apt_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"
    signed_by: "{{ foundry_tailscale_apt_keyring_path }}"
    state: present
  register: foundry_tailscale_repo
  when: foundry_tailscale_state == 'present'

- name: Install Tailscale package
  ansible.builtin.apt:
    name: "{{ foundry_tailscale_apt_package }}"
    state: present
    update_cache: true
    cache_valid_time: "{{ 0 if foundry_tailscale_repo.changed else 3600 }}"
    lock_timeout: 30
  when: foundry_tailscale_state == 'present'

- name: Enable and start tailscaled
  ansible.builtin.systemd_service:
    name: "{{ foundry_tailscale_service_name }}"
    enabled: true
    state: started
  when: foundry_tailscale_state == 'present'

- name: Enroll Tailscale with auth key (first run)
  ansible.builtin.command:
    cmd: >-
      {{ foundry_tailscale_binary_path }} up
      --authkey={{ foundry_tailscale_authkey }}
      {{ foundry_tailscale_effective_args }}
  changed_when: true
  no_log: true
  when:
    - foundry_tailscale_state == 'present'
    - not (foundry_tailscale_already_enrolled | bool)
    - foundry_tailscale_authkey | trim | length > 0

- name: Apply Tailscale arguments on already-enrolled node without auth key
  ansible.builtin.command:
    cmd: "{{ foundry_tailscale_binary_path }} up {{ foundry_tailscale_effective_args }}"
  changed_when: false
  when:
    - foundry_tailscale_state == 'present'
    - foundry_tailscale_already_enrolled | bool
    - foundry_tailscale_authkey | trim | length == 0

- name: Stop and disable tailscaled when removing
  ansible.builtin.systemd_service:
    name: "{{ foundry_tailscale_service_name }}"
    enabled: false
    state: stopped
  failed_when: false
  when: foundry_tailscale_state == 'absent'

- name: Remove Tailscale package
  ansible.builtin.apt:
    name: "{{ foundry_tailscale_apt_package }}"
    state: absent
    purge: true
    lock_timeout: 30
  when: foundry_tailscale_state == 'absent'
