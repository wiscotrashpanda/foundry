---
samba_packages:
  - samba
  - smbclient

samba_group: smbusers
samba_users: "{{ foundry_users }}"
samba_manage_passwords: false
samba_vault_file: "{{ inventory_dir }}/vault/foundry.yml"
samba_user_passwords: {}

samba_service_name: smbd
samba_nmbd_service_name: nmbd
samba_enable_nmbd: false

samba_workgroup: WORKGROUP
samba_netbios_name: FOUNDRY
samba_server_string: Foundry Tailnet SMB
samba_interfaces:
  - lo
samba_tailnet_binary_path: /usr/bin/tailscale
samba_tailnet_bind_ipv6: true
samba_bind_interfaces_only: false
samba_hosts_allow:
  - 127.0.0.1
  - 100.64.0.0/255.192.0.0
  - fd7a:115c:a1e0::/48
samba_hosts_deny:
  - 0.0.0.0/0
  - ::/0
samba_systemd_after_tailscale: true
samba_systemd_override_dir: "/etc/systemd/system/{{ samba_service_name }}.service.d"

samba_required_mount_point: /mnt/store
samba_share_path: "{{ samba_required_mount_point }}/share"
samba_share_vfs_objects:
  - catia
  - fruit
  - streams_xattr
samba_shares:
  - name: store
    comment: Foundry Tailnet shared storage
    path: "{{ samba_share_path }}"
    required_mount: "{{ samba_required_mount_point }}"
    owner: root
    group: "{{ samba_group }}"
    mode: "2775"
    browseable: true
    read_only: false
    guest_ok: false
    valid_users: "@{{ samba_group }}"
    force_group: "{{ samba_group }}"
    create_mask: "0664"
    directory_mask: "2775"
