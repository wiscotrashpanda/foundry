---
# Shared apt settings.
developer_clis_apt_package_state: latest
developer_clis_apt_cache_valid_time: 3600
developer_clis_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
  ppc64le: ppc64el

developer_clis_prerequisite_packages:
  - ca-certificates
  - curl
  - gnupg
  - python3-debian
  - unzip

# Git is managed alongside the rest so users always get a current toolchain.
developer_clis_git_package: git

# GitHub CLI.
developer_clis_github_keyring_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
developer_clis_github_keyring_checksum: sha256:6084d5d7bd8e288441e0e94fc6275570895da18e6751f70f057485dc2d1a811b
developer_clis_github_keyring_path: /etc/apt/keyrings/githubcli-archive-keyring.gpg
developer_clis_github_apt_repo: https://cli.github.com/packages
developer_clis_gh_package: gh

# Gitea tea CLI.
developer_clis_tea_version: 0.14.0
developer_clis_tea_release_base_url: https://gitea.com/gitea/tea/releases/download
developer_clis_tea_install_path: /usr/local/bin/tea
developer_clis_tea_arch_map:
  x86_64: amd64
  aarch64: arm64

# HashiCorp Terraform.
# HashiCorp publishes Ubuntu suites named after each supported codename and can
# lag behind brand-new Ubuntu releases. Map unsupported new codenames to the
# newest supported suite until HashiCorp publishes native packages for them.
developer_clis_hashicorp_suite_fallbacks:
  resolute: questing
developer_clis_hashicorp_keyring_url: https://apt.releases.hashicorp.com/gpg
developer_clis_hashicorp_keyring_path: /etc/apt/keyrings/hashicorp-archive-keyring.asc
developer_clis_hashicorp_keyring_checksum: ""
developer_clis_hashicorp_apt_repo: https://apt.releases.hashicorp.com
developer_clis_hashicorp_suite: >-
  {{
    developer_clis_hashicorp_suite_fallbacks.get(
      ansible_facts['distribution_release'],
      ansible_facts['distribution_release']
    )
  }}
developer_clis_terraform_package: terraform

# AWS CLI v2 - downloaded directly from AWS, version pulled from the upstream
# GitHub release feed and re-installed only when the installed copy lags.
# Use /releases?per_page=1 instead of /releases/latest because AWS often flags
# their newest releases as prerelease, which makes /latest return 404.
developer_clis_aws_cli_releases_url: https://api.github.com/repos/aws/aws-cli/releases?per_page=1
developer_clis_aws_cli_zip_url: "https://awscli.amazonaws.com/awscli-exe-linux-{{ ansible_facts['architecture'] }}.zip"
developer_clis_aws_cli_install_dir: /usr/local/aws-cli
developer_clis_aws_cli_bin_dir: /usr/local/bin

# Google Cloud CLI.
developer_clis_gcloud_keyring_url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
developer_clis_gcloud_keyring_path: /etc/apt/keyrings/cloud.google.asc
developer_clis_gcloud_keyring_checksum: ""
developer_clis_gcloud_apt_repo: https://packages.cloud.google.com/apt
developer_clis_gcloud_packages:
  - google-cloud-cli
  - google-cloud-cli-gke-gcloud-auth-plugin

# Node.js (NodeSource). Bump the major to move the system Node. NodeSource's
# nodejs bundles its own npm and Conflicts with Ubuntu's `npm` package, so
# the role pins nodejs to NodeSource via /etc/apt/preferences.d and installs
# nodejs only - npm comes along for the ride.
developer_clis_nodejs_major: 22
developer_clis_nodejs_keyring_url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
developer_clis_nodejs_keyring_path: /etc/apt/keyrings/nodesource.asc
developer_clis_nodejs_keyring_checksum: ""
developer_clis_nodejs_apt_repo: "https://deb.nodesource.com/node_{{ developer_clis_nodejs_major }}.x"
developer_clis_nodejs_packages:
  - nodejs

# Globally-installed npm CLIs (Claude Code, OpenAI Codex). Tracked at @latest;
# add or remove packages by editing this list.
developer_clis_npm_global_packages:
  - "@anthropic-ai/claude-code"
  - "@openai/codex"

# opencode (sst/opencode). Version is resolved from the GitHub releases feed
# and the matching tarball is fetched dynamically.
# See aws-cli note: /releases?per_page=1 is more resilient than /releases/latest
# when upstream marks newer releases as prerelease.
developer_clis_opencode_releases_url: https://api.github.com/repos/sst/opencode/releases?per_page=1
developer_clis_opencode_install_path: /usr/local/bin/opencode
developer_clis_opencode_arch_map:
  x86_64: x64
  aarch64: arm64

# Go - installed from the upstream tarball at go.dev/dl. The list endpoint
# returns stable releases newest-first; the role picks the first stable entry
# and re-installs only when the host's `go version` lags. The tarball extracts
# to /usr/local/go per the official install instructions; binaries are exposed
# via symlinks under /usr/local/bin.
developer_clis_golang_releases_url: https://go.dev/dl/?mode=json
developer_clis_golang_download_base_url: https://go.dev/dl
developer_clis_golang_install_dir: /usr/local/go
developer_clis_golang_bin_dir: /usr/local/bin
developer_clis_golang_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armv6l
  ppc64le: ppc64le

# Alias `python` to `python3` system-wide via Ubuntu's python-is-python3
# package, which manages the /usr/bin/python -> python3 symlink through
# update-alternatives.
developer_clis_python_is_python3_package: python-is-python3
