---
- name: Require Ubuntu
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] == "Ubuntu"
    fail_msg: "The developer_clis role is written for Ubuntu hosts."

- name: Set up apt prerequisites
  ansible.builtin.import_tasks: apt-prereqs.yml

- name: Install GitHub CLI
  ansible.builtin.import_tasks: github-cli.yml

- name: Install Gitea tea CLI
  ansible.builtin.import_tasks: gitea-tea.yml

- name: Install HashiCorp Terraform
  ansible.builtin.import_tasks: terraform.yml

- name: Install AWS CLI v2
  ansible.builtin.import_tasks: aws-cli.yml

- name: Install Google Cloud CLI
  ansible.builtin.import_tasks: gcloud.yml

- name: Install Node.js (NodeSource)
  ansible.builtin.import_tasks: nodejs.yml

- name: Install npm-managed CLIs
  ansible.builtin.import_tasks: npm-globals.yml

- name: Install opencode
  ansible.builtin.import_tasks: opencode.yml

- name: Install Go
  ansible.builtin.import_tasks: golang.yml

- name: Alias python to python3
  ansible.builtin.import_tasks: python.yml
