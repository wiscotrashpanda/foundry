---
- name: Ensure ansible-pull prerequisites are installed
  ansible.builtin.apt:
    name: "{{ self_pull_apt_packages }}"
    state: present
    lock_timeout: 30

- name: Ensure foundry state directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ self_pull_etc_dir }}"
      owner: root
      group: "{{ self_pull_run_group }}"
      mode: "{{ self_pull_etc_mode }}"
    - path: "{{ self_pull_state_dir }}"
      owner: "{{ self_pull_run_user }}"
      group: "{{ self_pull_run_group }}"
      mode: "{{ self_pull_state_mode }}"
    - path: "{{ self_pull_log_dir }}"
      owner: "{{ self_pull_run_user }}"
      group: "{{ self_pull_run_group }}"
      mode: "{{ self_pull_state_mode }}"
    - path: "{{ self_pull_collections_dir }}"
      owner: "{{ self_pull_run_user }}"
      group: "{{ self_pull_run_group }}"
      mode: "{{ self_pull_state_mode }}"
  loop_control:
    label: "{{ item.path }}"

- name: Ensure foundry writable state ownership is consistent
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ self_pull_run_user }}"
    group: "{{ self_pull_run_group }}"
    recurse: true
  loop:
    - "{{ self_pull_state_dir }}"
    - "{{ self_pull_log_dir }}"

- name: Install foundry-pull wrapper
  ansible.builtin.template:
    src: foundry-pull.j2
    dest: "{{ self_pull_wrapper_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install foundry-pull systemd service
  ansible.builtin.template:
    src: foundry-pull.service.j2
    dest: /etc/systemd/system/foundry-pull.service
    owner: root
    group: root
    mode: "0644"
  register: self_pull_service_unit

- name: Install foundry-pull systemd timer
  ansible.builtin.template:
    src: foundry-pull.timer.j2
    dest: /etc/systemd/system/foundry-pull.timer
    owner: root
    group: root
    mode: "0644"
  register: self_pull_timer_unit

- name: Reload systemd units when changed
  ansible.builtin.systemd:
    daemon_reload: true
  when: self_pull_service_unit.changed or self_pull_timer_unit.changed

- name: Enable and start foundry-pull timer
  ansible.builtin.systemd:
    name: foundry-pull.timer
    enabled: true
    state: started
