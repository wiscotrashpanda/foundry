---
- name: Install Docker Engine
  hosts: foundry
  gather_facts: true
  become: true

  vars:
    foundry_docker_apt_repo: https://download.docker.com/linux/ubuntu
    foundry_docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
      ppc64le: ppc64el
    foundry_docker_conflicting_packages:
      - docker.io
      - docker-doc
      - docker-compose
      - docker-compose-v2
      - podman-docker
      - containerd
      - runc
    foundry_docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    foundry_docker_compose_dir: /srv/docker
    foundry_docker_plex_compose_file: plex-media-server.yml
    foundry_docker_users:
      - josh
      - powerchord

  tasks:
    - name: Require Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "Ubuntu"
        fail_msg: "This playbook is written for Ubuntu hosts."

    - name: Remove Docker package conflicts
      ansible.builtin.apt:
        name: "{{ foundry_docker_conflicting_packages }}"
        state: absent

    - name: Ensure Docker apt prerequisites exist
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - python3-debian
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Add Docker apt repository
      ansible.builtin.deb822_repository:
        name: docker
        types:
          - deb
        uris:
          - "{{ foundry_docker_apt_repo }}"
        suites:
          - "{{ ansible_facts['distribution_release'] }}"
        components:
          - stable
        architectures:
          - "{{ foundry_docker_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"
        signed_by: "{{ foundry_docker_apt_repo }}/gpg"
        state: present
      register: foundry_docker_repo

    - name: Refresh apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true
      when: foundry_docker_repo.changed

    - name: Ensure Docker packages exist
      ansible.builtin.apt:
        name: "{{ foundry_docker_packages }}"
        state: present

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Check whether Docker users exist
      ansible.builtin.command:
        cmd: "id -u {{ item }}"
      register: foundry_docker_user_check
      changed_when: false
      failed_when: false
      loop: "{{ foundry_docker_users }}"

    - name: Allow existing human users to manage Docker
      ansible.builtin.user:
        name: "{{ item.item }}"
        groups:
          - docker
        append: true
      when: item.rc == 0
      loop: "{{ foundry_docker_user_check.results }}"

    - name: Ensure Docker Compose service directory exists
      ansible.builtin.file:
        path: "{{ foundry_docker_compose_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy Plex Docker Compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/{{ foundry_docker_plex_compose_file }}"
        dest: "{{ foundry_docker_compose_dir }}/{{ foundry_docker_plex_compose_file }}"
        owner: root
        group: root
        mode: "0644"
