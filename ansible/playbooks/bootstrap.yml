---
- name: Bootstrap the Ansible provisioning user
  hosts: foundry_bootstrap
  gather_facts: false
  become: true

  vars:
    bootstrap_ansible_user: ansible
    bootstrap_ansible_public_key_file: "{{ lookup('env', 'HOME') }}/.ssh/ansible.pub"
    bootstrap_ansible_sudo_group: sudo

  pre_tasks:
    - name: Check for the local ansible public key
      ansible.builtin.stat:
        path: "{{ bootstrap_ansible_public_key_file }}"
      register: bootstrap_public_key
      delegate_to: localhost
      become: false

    - name: Require the local ansible public key
      ansible.builtin.fail:
        msg: >-
          Expected {{ bootstrap_ansible_public_key_file }} on the Ansible
          controller. Create that public key before running this playbook.
      when: not bootstrap_public_key.stat.exists

  tasks:
    - name: Ensure the Ansible user exists
      ansible.builtin.user:
        name: "{{ bootstrap_ansible_user }}"
        shell: /bin/bash
        create_home: true
        groups:
          - "{{ bootstrap_ansible_sudo_group }}"
        append: true

    - name: Ensure the Ansible user SSH directory exists
      ansible.builtin.file:
        path: "/home/{{ bootstrap_ansible_user }}/.ssh"
        state: directory
        owner: "{{ bootstrap_ansible_user }}"
        group: "{{ bootstrap_ansible_user }}"
        mode: "0700"

    - name: Install the ansible public key
      ansible.builtin.lineinfile:
        path: "/home/{{ bootstrap_ansible_user }}/.ssh/authorized_keys"
        line: "{{ lookup('file', bootstrap_ansible_public_key_file) }}"
        create: true
        owner: "{{ bootstrap_ansible_user }}"
        group: "{{ bootstrap_ansible_user }}"
        mode: "0600"

    - name: Allow passwordless sudo for the Ansible user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ bootstrap_ansible_user }}"
        content: "{{ bootstrap_ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
