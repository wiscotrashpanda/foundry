---
- name: Configure foundry external storage
  hosts: foundry
  gather_facts: false
  become: true

  vars:
    foundry_storage_thunderbolt_uuid: cd010000-0080-7518-a3c0-2d8c0a218202
    foundry_storage_device_uuid: c072b758-e4e4-44ea-8251-ef0891930805
    foundry_storage_mount_point: /mnt/store
    foundry_storage_fstype: ext4
    foundry_storage_mount_opts: defaults,nofail,x-systemd.device-timeout=30s
    foundry_storage_plex_dir: "{{ foundry_storage_mount_point }}/plex"
    foundry_storage_plex_config_dir: "{{ foundry_storage_plex_dir }}/config"
    foundry_storage_plex_uid: "1000"
    foundry_storage_plex_gid: "1000"

  tasks:
    - name: Ensure Thunderbolt authorization tooling exists
      ansible.builtin.apt:
        name: bolt
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure boltd is running
      ansible.builtin.service:
        name: bolt
        state: started
        enabled: true

    - name: Read G-DRIVE Thunderbolt enrollment
      ansible.builtin.command:
        cmd: "boltctl info {{ foundry_storage_thunderbolt_uuid }}"
      register: foundry_storage_bolt_info
      changed_when: false

    - name: Enroll G-DRIVE Thunderbolt device for automatic authorization
      ansible.builtin.command:
        cmd: "boltctl enroll {{ foundry_storage_thunderbolt_uuid }}"
      when: "'stored:        no' in foundry_storage_bolt_info.stdout"

    - name: Wait for the G-DRIVE filesystem UUID
      ansible.builtin.command:
        cmd: "blkid -U {{ foundry_storage_device_uuid }}"
      register: foundry_storage_blkid
      changed_when: false
      retries: 10
      delay: 1
      until: foundry_storage_blkid.rc == 0

    - name: Ensure G-DRIVE mount point exists
      ansible.builtin.file:
        path: "{{ foundry_storage_mount_point }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Mount G-DRIVE and persist it in fstab
      ansible.posix.mount:
        path: "{{ foundry_storage_mount_point }}"
        src: "UUID={{ foundry_storage_device_uuid }}"
        fstype: "{{ foundry_storage_fstype }}"
        opts: "{{ foundry_storage_mount_opts }}"
        dump: "0"
        passno: "2"
        state: mounted

    - name: Ensure Plex media directory exists on G-DRIVE
      ansible.builtin.file:
        path: "{{ foundry_storage_plex_dir }}"
        state: directory
        owner: "{{ foundry_storage_plex_uid }}"
        group: "{{ foundry_storage_plex_gid }}"
        mode: "0755"

    - name: Ensure Plex config directory exists on G-DRIVE
      ansible.builtin.file:
        path: "{{ foundry_storage_plex_config_dir }}"
        state: directory
        owner: "{{ foundry_storage_plex_uid }}"
        group: "{{ foundry_storage_plex_gid }}"
        mode: "0755"
