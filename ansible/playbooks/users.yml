---
- name: Configure human users
  hosts: foundry
  gather_facts: false
  become: true

  vars:
    foundry_passwordless_sudo_group: admin-sudo
    foundry_oh_my_zsh_repo: https://github.com/ohmyzsh/ohmyzsh.git
    foundry_user_public_key_file: "{{ lookup('env', 'HOME') }}/.ssh/foundry.pub"

  pre_tasks:
    - name: Check for the local foundry public key
      ansible.builtin.stat:
        path: "{{ foundry_user_public_key_file }}"
      register: foundry_user_public_key
      delegate_to: localhost
      become: false

    - name: Require the local foundry public key
      ansible.builtin.fail:
        msg: >-
          Expected {{ foundry_user_public_key_file }} on the Ansible controller.
          Create that public key before running this playbook.
      when: not foundry_user_public_key.stat.exists

  tasks:
    - name: Ensure user shell packages exist
      ansible.builtin.apt:
        name:
          - eza
          - git
          - ncurses-bin
          - zsh
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure shared terminfo source directory exists
      ansible.builtin.file:
        path: /usr/local/share/foundry/terminfo
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install xterm-ghostty terminfo source
      ansible.builtin.copy:
        src: xterm-ghostty.terminfo
        dest: /usr/local/share/foundry/terminfo/xterm-ghostty.terminfo
        owner: root
        group: root
        mode: "0644"
      register: foundry_xterm_ghostty_source

    - name: Check for system xterm-ghostty terminfo
      ansible.builtin.stat:
        path: /usr/share/terminfo/x/xterm-ghostty
      register: foundry_xterm_ghostty_terminfo

    - name: Compile system xterm-ghostty terminfo
      ansible.builtin.command:
        cmd: tic -x -o /usr/share/terminfo /usr/local/share/foundry/terminfo/xterm-ghostty.terminfo
      when: foundry_xterm_ghostty_source.changed or not foundry_xterm_ghostty_terminfo.stat.exists

    - name: Ensure human user groups exist
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      loop: "{{ foundry_users }}"

    - name: Ensure passwordless sudo group exists
      ansible.builtin.group:
        name: "{{ foundry_passwordless_sudo_group }}"
        state: present

    - name: Ensure human users exist
      ansible.builtin.user:
        name: "{{ item }}"
        group: "{{ item }}"
        shell: /bin/zsh
        create_home: true
        groups:
          - "{{ foundry_passwordless_sudo_group }}"
        append: true
      loop: "{{ foundry_users }}"

    - name: Remove legacy per-user passwordless sudo grants
      ansible.builtin.file:
        dest: "/etc/sudoers.d/{{ item }}"
        state: absent
      loop: "{{ foundry_users }}"

    - name: Ensure user code directories exist
      ansible.builtin.file:
        path: "/home/{{ item }}/code"
        state: directory
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0755"
      loop: "{{ foundry_users }}"

    - name: Ensure user SSH directories exist
      ansible.builtin.file:
        path: "/home/{{ item }}/.ssh"
        state: directory
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0700"
      loop: "{{ foundry_users }}"

    - name: Install foundry public key for human users
      ansible.builtin.lineinfile:
        path: "/home/{{ item }}/.ssh/authorized_keys"
        line: "{{ lookup('file', foundry_user_public_key_file) }}"
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0600"
      loop: "{{ foundry_users }}"

    - name: Install global gitconfig for human users
      ansible.builtin.copy:
        dest: "/home/{{ item }}/.gitconfig"
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
        content: |
          [user]
          	name = {{ foundry_user_full_name }}
          	email = {{ foundry_user_emails[item] }}
      loop: "{{ foundry_users }}"

    - name: Install Oh My Zsh for human users
      ansible.builtin.git:
        repo: "{{ foundry_oh_my_zsh_repo }}"
        dest: "/home/{{ item }}/.oh-my-zsh"
        version: master
        update: false
        depth: 1
      become_user: "{{ item }}"
      environment:
        HOME: "/home/{{ item }}"
      loop: "{{ foundry_users }}"

    - name: Check zsh configs for Oh My Zsh
      ansible.builtin.command:
        cmd: grep -Eq '(^|[[:space:]])source .*(oh-my-zsh\.sh)|ZSH=.*/\.oh-my-zsh' "/home/{{ item }}/.zshrc"
      register: foundry_oh_my_zsh_config
      changed_when: false
      failed_when: false
      loop: "{{ foundry_users }}"

    - name: Back up existing zsh configs before Oh My Zsh initialization
      ansible.builtin.shell:
        cmd: |
          set -eu
          if [ -f "$HOME/.zshrc" ] && [ ! -f "$HOME/.zshrc.pre-oh-my-zsh" ]; then
            cp "$HOME/.zshrc" "$HOME/.zshrc.pre-oh-my-zsh"
            echo changed
          fi
      become_user: "{{ item.item }}"
      environment:
        HOME: "/home/{{ item.item }}"
      register: foundry_oh_my_zsh_backup
      changed_when: "'changed' in foundry_oh_my_zsh_backup.stdout"
      when: item.rc != 0
      loop: "{{ foundry_oh_my_zsh_config.results }}"

    - name: Initialize zsh configs from the Oh My Zsh template
      ansible.builtin.copy:
        src: "/home/{{ item.item }}/.oh-my-zsh/templates/zshrc.zsh-template"
        dest: "/home/{{ item.item }}/.zshrc"
        owner: "{{ item.item }}"
        group: "{{ item.item }}"
        mode: "0644"
        remote_src: true
        force: true
      when: item.rc != 0
      loop: "{{ foundry_oh_my_zsh_config.results }}"

    - name: Alias ls to eza for human users
      ansible.builtin.blockinfile:
        path: "/home/{{ item.item }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED EZA ALIASES"
        block: |
          alias ls="eza"
        owner: "{{ item.item }}"
        group: "{{ item.item }}"
        mode: "0644"
      loop: "{{ foundry_oh_my_zsh_config.results }}"
