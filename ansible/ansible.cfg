[defaults]
inventory = inventory.yml
local_tmp = .tmp
roles_path = roles
collections_path = collections
retry_files_enabled = False
stdout_callback = default
result_format = yaml
vault_password_file = .vault-password

[ssh_connection]
control_path = %(directory)s/%%C
control_path_dir = /tmp/foundry-ansible-cp
pipelining = True
